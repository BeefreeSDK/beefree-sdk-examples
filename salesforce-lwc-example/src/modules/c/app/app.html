<template>
  <div class="container">
    <template lwc:if={isLoading}>
      <div class="status-message">
        <div class="spinner"></div>
        <p>Loading Beefree Editor…</p>
      </div>
    </template>

    <template lwc:if={error}>
      <div class="status-message error">
        <p>⚠ {error}</p>
        <p class="hint">Check the server is running and .env is configured.</p>
      </div>
    </template>

    <template lwc:if={isReady}>
      <!-- Toolbar with SDK actions -->
      <header class="toolbar">
        <div class="toolbar-brand">Beefree SDK (version: {appVersion})</div>
        <div class="toolbar-actions">
          <div class="toolbar-btn-group">
            <button class="toolbar-btn" onclick={handleLoad} title="Load Template">
              📂 Load Template
            </button>
          </div>
          <span class="toolbar-separator"></span>
          <div class="toolbar-btn-group">
            <button class="toolbar-btn" onclick={handleToggleStructure} title="Toggle Structure">
              ☰ Structure
            </button>
            <button class="toolbar-btn" onclick={handleTogglePreview} title="Toggle Preview">
              👁 Preview
            </button>
          </div>
          <span class="toolbar-separator"></span>
          <div class="toolbar-btn-group">
            <button class="toolbar-btn toolbar-btn--secondary" onclick={handleSaveAsTemplate} title="Save as Template">
              📄 Save JSON
            </button>
            <button class="toolbar-btn toolbar-btn--primary" onclick={handleSave} title="Save">
              💾 Save HTML
            </button>
          </div>
        </div>
      </header>

      <!-- Editor container -->
      <div class="editor-wrapper">
        <c-beefree-editor
          token-data={tokenData}
          template-json={templateJson}
          config={editorConfig}
          uid="salesforce-lwc-example"
        ></c-beefree-editor>
      </div>
    </template>
  </div>
</template>
